    <style>
        :root {
            --primary: #1565c0;
            --primary-light: #e3f2fd;
            --secondary: #4caf50;
            --danger: #f44336;
            --warning: #ff9800;
            --text: #333;
            --text-light: #666;
            --bg: #f8f9fa;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --transition: all 0.3s ease;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            box-shadow: var(--shadow);
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            overflow-y: auto;
            z-index: 100;
            animation: fadeInLeft 1s ease;
        }

        @keyframes fadeInLeft {
            0% { opacity: 0; transform: translateX(-30px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        .sidebar-header {
            padding: 25px 20px 15px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .sidebar-header h2 {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--primary);
            font-size: 22px;
        }

        .sidebar-header h2 i {
            font-size: 24px;
        }

        .sidebar-menu {
            list-style: none;
            padding: 15px 0;
        }

        .sidebar-menu li {
            margin: 5px 15px;
        }

        .sidebar-menu a {
            text-decoration: none;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            transition: var(--transition);
            font-size: 16px;
        }

        .sidebar-menu a i {
            font-size: 18px;
            color: var(--primary);
            width: 24px;
            text-align: center;
        }

        .sidebar-menu a:hover {
            background: rgba(21, 101, 192, 0.1);
            color: var(--primary);
            transform: translateX(5px);
        }

        .sidebar-menu a.active {
            background: rgba(21, 101, 192, 0.15);
            color: var(--primary);
            font-weight: 600;
        }

        .sidebar hr {
            border: none;
            height: 1px;
            background: linear-gradient(to right, transparent, #ddd, transparent);
            margin: 20px 0;
        }

        /* Main Content Styles */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--primary);
            font-size: 28px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        /* Search and Filter */
        .search-container {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: 1px solid #ddd;
            border-radius: 30px;
            font-size: 16px;
            transition: var(--transition);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(21, 101, 192, 0.1);
        }

        .search-box i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }

        .reset-btn {
            padding: 12px 25px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 30px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .reset-btn:hover {
            background: var(--primary-light);
            color: var(--primary);
        }

        /* Department Filter */
        .department-filter {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 30px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
        }

        .filter-btn:hover {
            background: var(--primary-light);
            color: var(--primary);
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Room Grid */
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .room-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .room-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .room-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--primary);
        }

        .room-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .status-available {
            background: rgba(76, 175, 80, 0.15);
            color: var(--secondary);
        }

        .status-occupied {
            background: rgba(244, 67, 54, 0.15);
            color: var(--danger);
        }

        .status-maintenance {
            background: rgba(255, 152, 0, 0.15);
            color: var(--warning);
        }

        .room-details {
            margin-bottom: 20px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .detail-item i {
            color: var(--primary);
            width: 20px;
        }

        .detail-label {
            font-weight: 500;
            min-width: 120px;
        }

        .detail-value {
            color: var(--text-light);
        }

        .doctor-name, .nurse-name {
            font-weight: 600;
            color: var(--text);
        }

        .cleaning-status {
            background: var(--primary-light);
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
        }

        .cleaning-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .cleaning-title {
            font-weight: 600;
            color: var(--primary);
        }

        .cleaning-timer {
            font-weight: 600;
            color: var(--warning);
        }

        .cleaning-bar {
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
        }

        .cleaning-progress {
            height: 100%;
            background: var(--warning);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        /* Stats Overview */
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }

        .stat-icon.blue {
            background: var(--primary);
        }

        .stat-icon.green {
            background: var(--secondary);
        }

        .stat-icon.orange {
            background: var(--warning);
        }

        .stat-info {
            flex: 1;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--text-light);
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .rooms-grid {
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
            }
            
            .sidebar-menu span {
                display: none;
            }
            
            .sidebar-header h2 span {
                display: none;
            }
            
            .main-content {
                margin-left: 70px;
            }
            
            .rooms-grid {
                grid-template-columns: 1fr;
            }
            
            .search-container {
                flex-direction: column;
            }
            
            .search-box {
                min-width: 100%;
            }
        }
    </style>
</head>

        // Function to render rooms based on selected department and search query
        function renderRooms(department = 'all', searchQuery = '') {
            const container = document.getElementById('roomsContainer');
            container.innerHTML = '';
            
            let filteredRooms = roomsData;
            
            // Filter by department
            if (department !== 'all') {
                filteredRooms = filteredRooms.filter(room => room.department === department);
            }
            
            // Filter by search query
            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                filteredRooms = filteredRooms.filter(room => 
                    room.name.toLowerCase().includes(query) ||
                    room.doctor.toLowerCase().includes(query) ||
                    room.department.toLowerCase().includes(query)
                );
            }
            
            // Update stats
            updateStats(filteredRooms);
            
            // Render room cards
            filteredRooms.forEach(room => {
                const roomCard = document.createElement('div');
                roomCard.className = 'room-card';
                
                let statusClass, statusText;
                if (room.status === 'available') {
                    statusClass = 'status-available';
                    statusText = 'Available';
                } else if (room.status === 'occupied') {
                    statusClass = 'status-occupied';
                    statusText = 'Occupied';
                } else {
                    statusClass = 'status-maintenance';
                    statusText = 'Maintenance';
                }
                
                // Calculate time until next cleaning
                const now = new Date();
                const nextCleaning = new Date();
                const [hours, minutes] = room.nextCleaning.split(':');
                nextCleaning.setHours(parseInt(hours), parseInt(minutes), 0, 0);
                
                if (nextCleaning < now) {
                    nextCleaning.setDate(nextCleaning.getDate() + 1);
                }
                
                const timeDiff = nextCleaning - now;
                const hoursUntilCleaning = Math.floor(timeDiff / (1000 * 60 * 60));
                const minutesUntilCleaning = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
                
                // Calculate progress percentage for cleaning
                const totalMinutesIn8Hours = 8 * 60;
                const lastCleaningTime = new Date();
                const [lastHours, lastMinutes] = room.lastCleaned.split(':');
                lastCleaningTime.setHours(parseInt(lastHours), parseInt(lastMinutes), 0, 0);
                
                if (lastCleaningTime > now) {
                    lastCleaningTime.setDate(lastCleaningTime.getDate() - 1);
                }
                
                const minutesSinceLastCleaning = (now - lastCleaningTime) / (1000 * 60);
                const progressPercentage = Math.min(100, (minutesSinceLastCleaning / totalMinutesIn8Hours) * 100);
                
                roomCard.innerHTML = `
                    <div class="room-header">
                        <div class="room-title">${room.name}</div>
                        <div class="room-status ${statusClass}">${statusText}</div>
                    </div>
                    <div class="room-details">
                        <div class="detail-item">
                            <i class="fas fa-procedures"></i>
                            <span class="detail-label">Patients:</span>
                            <span class="detail-value">${room.patients} / ${room.capacity}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-user-md"></i>
                            <span class="detail-label">Doctor:</span>
                            <span class="detail-value doctor-name">${room.doctor}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-user-nurse"></i>
                            <span class="detail-label">Nurse:</span>
                            <span class="detail-value nurse-name">${room.nurse}</span>
                        </div>
                    </div>
                    <div class="cleaning-status">
                        <div class="cleaning-header">
                            <div class="cleaning-title">Next Cleaning</div>
                            <div class="cleaning-timer">${hoursUntilCleaning}h ${minutesUntilCleaning}m</div>
                        </div>
                        <div class="cleaning-bar">
                            <div class="cleaning-progress" style="width: ${progressPercentage}%"></div>
                        </div>
                        <div class="detail-item" style="margin-top: 8px; margin-bottom: 0;">
                            <i class="fas fa-clock"></i>
                            <span class="detail-label">Last cleaned:</span>
                            <span class="detail-value">${room.lastCleaned}</span>
                        </div>
                    </div>
                `;
                
                container.appendChild(roomCard);
            });
        }

        // Function to update stats
        function updateStats(rooms) {
            const totalRooms = rooms.length;
            const availableRooms = rooms.filter(room => room.status === 'available').length;
            const maintenanceRooms = rooms.filter(room => room.status === 'maintenance').length;
            
            // Update the stats cards
            document.querySelector('.stat-card:nth-child(1) .stat-value').textContent = totalRooms;
            document.querySelector('.stat-card:nth-child(2) .stat-value').textContent = availableRooms;
            document.querySelector('.stat-card:nth-child(3) .stat-value').textContent = maintenanceRooms;
        }

        // Initialize the page with all rooms
        document.addEventListener('DOMContentLoaded', () => {
            renderRooms();
            
            // Add event listeners to filter buttons
            const filterButtons = document.querySelectorAll('.filter-btn');
            filterButtons.forEach(button => {
                button.addEventListener('click', () => {
                    // Remove active class from all buttons
                    filterButtons.forEach(btn => btn.classList.remove('active'));
                    
                    // Add active class to clicked button
                    button.classList.add('active');
                    
                    // Filter rooms by department
                    const department = button.getAttribute('data-department');
                    const searchQuery = document.getElementById('searchInput').value;
                    renderRooms(department, searchQuery);
                });
            });
            
            // Add event listener to search input
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', () => {
                const activeFilter = document.querySelector('.filter-btn.active');
                const department = activeFilter ? activeFilter.getAttribute('data-department') : 'all';
                const searchQuery = searchInput.value;
                renderRooms(department, searchQuery);
            });
            
            // Add event listener to reset button
            const resetBtn = document.getElementById('resetBtn');
            resetBtn.addEventListener('click', () => {
                // Reset search input
                searchInput.value = '';
                
                // Reset filter to "All Departments"
                filterButtons.forEach(btn => btn.classList.remove('active'));
                document.querySelector('.filter-btn[data-department="all"]').classList.add('active');
                
                // Render all rooms
                renderRooms();
            });
            
            // Update cleaning timers every minute
            setInterval(() => {
                const activeFilter = document.querySelector('.filter-btn.active');
                const department = activeFilter ? activeFilter.getAttribute('data-department') : 'all';
                const searchQuery = searchInput.value;
                renderRooms(department, searchQuery);
            }, 60000);
        });
    </script>
